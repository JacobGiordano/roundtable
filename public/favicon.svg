<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <title>Roundtable</title>

  <style>
    @media (prefers-color-scheme: light) {
      .icon-bg   { fill: #2D2B55; }
      .icon-mark { stroke: #FFFFFF; fill: none; }
      .icon-mark-fill { fill: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .icon-bg   { fill: #2D2B55; }
      .icon-mark { stroke: #FFFFFF; fill: none; }
      .icon-mark-fill { fill: #FFFFFF; }
    }
  </style>

  <!-- Outer filled circle — brand primary #2D2B55 -->
  <circle cx="24" cy="24" r="22" class="icon-bg" fill="#2D2B55"/>

  <!-- Ring (table surface) — stroke color supplied by .icon-mark CSS class -->
  <circle cx="24" cy="24" r="14" fill="none" class="icon-mark" stroke-width="2"/>

  <!-- Six seat dots — pointy-top hexagonal arrangement on the ring at r=14 -->
  <circle cx="24"    cy="10"    r="3" class="icon-mark-fill" fill="#FFFFFF"/>
  <circle cx="36.12" cy="17"    r="3" class="icon-mark-fill" fill="#FFFFFF"/>
  <circle cx="36.12" cy="31"    r="3" class="icon-mark-fill" fill="#FFFFFF"/>
  <circle cx="24"    cy="38"    r="3" class="icon-mark-fill" fill="#FFFFFF"/>
  <circle cx="11.88" cy="31"    r="3" class="icon-mark-fill" fill="#FFFFFF"/>
  <circle cx="11.88" cy="17"    r="3" class="icon-mark-fill" fill="#FFFFFF"/>

  <!-- Center dot — gathering point -->
  <circle cx="24" cy="24" r="3.5" class="icon-mark-fill" fill="#FFFFFF"/>
</svg>
