# .github/workflows/ci.yml
#
# Runs on every push to main and every pull request targeting main.
# Jobs: lint → build + test + backend-lint-build (parallel after lint passes).
# All four jobs must pass — lint is the gate; the rest run in parallel.
#
# Note: uses `npm run test:run` (vitest run) rather than `npm test` (vitest watch)
# because the watch-mode process does not exit and would hang the runner.
#
# Secrets required: none — all steps use public actions and project scripts.
# Expected runtime: ~2–3 min on a warm npm cache.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:run

  backend-lint-build:
    name: Backend lint + build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm run lint
      - run: cd backend && npm run build
