# .github/workflows/ci.yml
#
# Runs on every push to main and every pull request targeting main.
# Jobs: lint → build + test + backend-lint-build-test (parallel after lint passes)
#               → e2e (after build and test both pass).
#
# Note: frontend uses `npm run test:run` (vitest run) rather than `npm test` (vitest watch)
# because the watch-mode process does not exit and would hang the runner.
# Backend uses `npm test` which maps to `vitest run` in backend/package.json — safe for CI.
#
# E2E notes:
#   - playwright.config.ts intentionally does NOT configure webServer; CI must
#     start the preview server before running tests.
#   - `npx vite preview --port 5173` is used (not `npm run preview`) so the
#     server binds to port 5173 to match playwright.config.ts's hardcoded
#     baseURL (http://localhost:5173). The default preview port is 4173.
#   - Only Chromium is installed (matches playwright.config.ts projects array).
#   - Artifacts (screenshots, traces, HTML report) are uploaded on failure only
#     to keep successful run storage lean.
#
# Secrets required: none — all steps use public actions and project scripts.
# Expected runtime: ~4–5 min on a warm npm cache.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:run -- --coverage

      # Upload the lcov coverage report so coverage history is preserved across
      # runs. `if: always()` ensures the artifact uploads even when tests fail,
      # allowing inspection of partial coverage on a red run.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  backend-lint-build-test:
    name: Backend lint + build + test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node 22 LTS: better-sqlite3 has prebuilt binaries for N22.
          # Compiling from source under Node 24 fails on ubuntu-latest
          # because prebuild-install@7.x does not publish N24 binaries.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm run lint
      - run: cd backend && npm run build
      # backend/package.json maps `npm test` to `vitest run` (not watch mode — safe for CI)
      - run: cd backend && npm test

  e2e:
    name: E2E smoke tests
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      # Start vite preview on port 5173 to match playwright.config.ts baseURL.
      # The default preview port is 4173; --port overrides it without touching
      # any project files.
      - name: Start preview server
        run: npx vite preview --port 5173 &

      # Poll until the server is accepting connections (up to 30 s).
      - name: Wait for preview server
        run: |
          echo "Waiting for http://localhost:5173 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start within 30 seconds" >&2
          exit 1

      - name: Run Playwright E2E smoke tests
        run: npm run test:e2e

      # Upload artifacts on failure so failures are diagnosable without a local repro.
      - name: Upload Playwright report and artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
