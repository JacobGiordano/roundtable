# .github/workflows/release.yml
#
# Triggered when a version tag is pushed (e.g. git tag v1.2.3 && git push --tags).
# What it does:
#   1. Runs the full CI gate (frontend lint + build + test:run, backend lint + build + test).
#   2. Builds the backend Docker image from backend/Dockerfile.
#   3. Pushes to GitHub Container Registry (ghcr.io) as two tags:
#        ghcr.io/jacobgiordano/roundtable:<version>   (e.g. v1.2.3)
#        ghcr.io/jacobgiordano/roundtable:latest
#   4. Creates a GitHub Release with auto-generated release notes (commit log since
#      the previous tag, generated by GitHub's built-in release notes engine).
#
# Secrets required:
#   GITHUB_TOKEN — auto-provided by Actions; requires write access to packages and contents.
#   No external secrets are needed.
#
# Repository permission required (one-time setup):
#   In your repo → Settings → Actions → General → Workflow permissions:
#   set "Read and write permissions" so GITHUB_TOKEN can push to GHCR and create releases.
#   Alternatively, the explicit `permissions` block below grants the needed scopes.
#
# Expected runtime: ~6–8 min total (CI ~4 min, Docker build ~2 min on warm cache).
#
# Image note: the Docker image is the self-hosted backend (backend/Dockerfile),
# not the frontend. The frontend is a static build served by the backend or any
# web host — it is not containerized here.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ─── CI gate ────────────────────────────────────────────────────────────────
  # All CI must pass before any artifact is produced. Mirrors ci.yml but omits
  # E2E (Playwright) — browser automation over a tag build is not meaningful
  # and would add ~2–3 min with no signal gain for a release gate.

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    name: Build (frontend)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    name: Test (frontend)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      # test:run = vitest run (exits when done, unlike `npm test` which is watch mode)
      - run: npm run test:run

  backend-ci:
    name: Backend lint + build + test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node 22 LTS: better-sqlite3 has prebuilt binaries for N22.
          # Compiling from source under Node 24 fails on ubuntu-latest
          # because prebuild-install@7.x does not publish N24 binaries.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm run lint
      - run: cd backend && npm run build
      # backend/package.json maps `npm test` to `vitest run` — safe for CI
      - run: cd backend && npm test

  # ─── Docker publish ─────────────────────────────────────────────────────────
  # Builds the backend image and pushes both a version tag and :latest.
  # Runs only after all CI jobs pass.

  docker:
    name: Build and push Docker image
    needs: [build, test, backend-ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Log in to GitHub Container Registry using the auto-provided GITHUB_TOKEN.
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract the tag name (e.g. "v1.2.3") and lowercase the repo owner for
      # the image name (GHCR requires lowercase).
      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── GitHub Release ─────────────────────────────────────────────────────────
  # Creates the GitHub Release after the Docker image is published.
  # Uses GitHub's built-in release notes generator, which groups merged PRs
  # and commits since the previous tag. No extra tooling needed.

  release:
    name: Create GitHub Release
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          # GitHub auto-generates notes from merged PR titles and commit messages
          # since the last tag. This is the simplest and most maintainable approach.
          generate_release_notes: true
          # Mark as a pre-release if the tag contains a pre-release identifier
          # (e.g. v1.0.0-beta.1). Full releases (v1.2.3) are not pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
