# .github/workflows/deploy-pages.yml
#
# Deploys the Roundtable frontend to GitHub Pages, but only after CI passes.
#
# Trigger: workflow_run on "CI" (must match ci.yml name: field exactly), on
# completed runs. The job-level condition gates on conclusion == 'success' so
# a red CI run never triggers a deploy. Previously this workflow triggered on
# push to main directly, which allowed broken commits to reach GitHub Pages.
#
# What it does:
#   1. Builds the frontend with VITE_BASE=/roundtable/ so that asset paths
#      resolve correctly under the GitHub Pages project URL:
#      https://jacobgiordano.github.io/roundtable/
#   2. Pushes the dist/ folder to the gh-pages branch via peaceiris/actions-gh-pages.
#
# Repo setup required:
#   Repository → Settings → Pages → Source → "Deploy from a branch"
#   Branch: gh-pages / root
#
# Secrets required: none — GITHUB_TOKEN is auto-provided by Actions.
#
# Expected runtime: ~2 min on a warm npm cache.

name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to GitHub Pages
    # Only deploy when CI passed — never deploy a red commit.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        # VITE_BASE sets the Vite `base` option (see vite.config.ts) so that
        # all asset references are rooted at /roundtable/ for the project page.
        # Omitting this env var (local dev, other deploys) falls back to '/'.
        run: npm run build
        env:
          VITE_BASE: /roundtable/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
