<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <title>Roundtable</title>

  <!--
    Monochrome variant for dark backgrounds.
    Uses currentColor — inherits white from parent in CSS contexts.
    Default fill: #FFFFFF (white on dark).
    The symbol inverts: white circle, filled background, with dark-colored interior marks.
    For true mono use: the circle stroke approach — a ring rather than a filled disc.
  -->

  <g id="symbol">
    <!-- Outer circle: stroke only, currentColor — reads as ring on any dark surface -->
    <circle cx="24" cy="24" r="22" fill="currentColor" opacity="1"/>

    <!-- Hexagon cutout — rendered as dark against light fill -->
    <!-- On dark bg: circle is white-filled, hexagon and dot are dark -->
    <!-- Use SVG mask for fill-based cutout effect -->
    <!-- Simpler approach: filled circle in currentColor, hexagon in background color.
         Since mono must work in CSS with currentColor, we use a mask instead. -->

    <!-- Mask: circle with hexagon hole and center dot hole -->
    <defs>
      <mask id="mono-dark-mask">
        <!-- White = show, black = hide (cut through) -->
        <rect width="48" height="48" fill="white"/>
        <polygon
          points="38,24 31,36.12 17,36.12 10,24 17,11.88 31,11.88"
          fill="black"
        />
        <circle cx="24" cy="24" r="3" fill="black"/>
      </mask>
    </defs>

    <!-- Circle with masked hexagon + dot cutouts -->
    <circle cx="24" cy="24" r="22" fill="currentColor" mask="url(#mono-dark-mask)"/>

    <!-- Hexagon as stroke outline on top — draws the hexagon edge in currentColor
         so the hexagon shape reads as a ring border, not just a void -->
    <polygon
      points="38,24 31,36.12 17,36.12 10,24 17,11.88 31,11.88"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linejoin="round"
    />

    <!-- Center dot in currentColor -->
    <circle cx="24" cy="24" r="3" fill="currentColor"/>
  </g>

  <g id="wordmark" transform="translate(64, 0)">
    <text
      x="0"
      y="30"
      font-family="'Space Grotesk', 'DM Sans', system-ui, sans-serif"
      font-size="20"
      font-weight="500"
      letter-spacing="2.4"
      fill="currentColor"
    >ROUNDTABLE</text>
  </g>
</svg>
