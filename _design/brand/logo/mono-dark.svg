<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <title>Roundtable</title>

  <!--
    Monochrome variant for dark backgrounds.
    Uses currentColor — consumer must set color: <light-value> on the parent.
    Default rendering: outer circle fill = currentColor (light/white);
    ring + seat dots + center dot = dark (#2D2B55 Roundtable Indigo).
    No masks required: R1 mark uses only additive elements.
    Note: the inner elements use the explicit dark brand value rather than currentColor
    because the consumer's currentColor is the light surface value — inner elements
    must contrast against the light-filled circle, so they invert to dark.
  -->

  <g id="symbol">
    <!-- Outer circle — currentColor, renders as light/white on dark surface -->
    <circle cx="24" cy="24" r="22" fill="currentColor"/>

    <!-- Ring (table surface) — dark stroke at r=14, contrasts against light circle -->
    <circle cx="24" cy="24" r="14" fill="none" stroke="#2D2B55" stroke-width="2"/>

    <!-- Six seat dots — dark, pointy-top hexagonal arrangement on ring -->
    <circle cx="24"    cy="10"    r="3" fill="#2D2B55"/>
    <circle cx="36.12" cy="17"    r="3" fill="#2D2B55"/>
    <circle cx="36.12" cy="31"    r="3" fill="#2D2B55"/>
    <circle cx="24"    cy="38"    r="3" fill="#2D2B55"/>
    <circle cx="11.88" cy="31"    r="3" fill="#2D2B55"/>
    <circle cx="11.88" cy="17"    r="3" fill="#2D2B55"/>

    <!-- Center dot — dark -->
    <circle cx="24" cy="24" r="3.5" fill="#2D2B55"/>
  </g>

  <g id="wordmark" transform="translate(64, 0)">
    <text
      x="0"
      y="30"
      font-family="'Space Grotesk', 'DM Sans', system-ui, sans-serif"
      font-size="20"
      font-weight="500"
      letter-spacing="2.4"
      fill="currentColor"
    >ROUNDTABLE</text>
  </g>
</svg>
