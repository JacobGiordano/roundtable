<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <title>Roundtable</title>

  <!-- Primary lockup: symbol (48×48) + wordmark, horizontal, symbol left-aligned -->
  <!-- Total width: 48 (symbol) + 16 (gap) + ~216 (wordmark) = 280 -->

  <g id="symbol">
    <!-- Outer filled circle — brand primary #2D2B55 -->
    <circle cx="24" cy="24" r="22" fill="#2D2B55"/>

    <!-- Ring (table surface) — white stroke at r=14 -->
    <circle cx="24" cy="24" r="14" fill="none" stroke="#FFFFFF" stroke-width="2"/>

    <!--
      Six seat dots — white, r=3, pointy-top hexagonal arrangement.
      Dot centers on the ring at r=14 from (24,24).
    -->
    <circle cx="24"    cy="10"    r="3" fill="#FFFFFF"/>
    <circle cx="36.12" cy="17"    r="3" fill="#FFFFFF"/>
    <circle cx="36.12" cy="31"    r="3" fill="#FFFFFF"/>
    <circle cx="24"    cy="38"    r="3" fill="#FFFFFF"/>
    <circle cx="11.88" cy="31"    r="3" fill="#FFFFFF"/>
    <circle cx="11.88" cy="17"    r="3" fill="#FFFFFF"/>

    <!-- Center dot -->
    <circle cx="24" cy="24" r="3.5" fill="#FFFFFF"/>
  </g>

  <g id="wordmark" transform="translate(64, 0)">
    <!--
      Wordmark vertically centered in 48px height.
      Font size 20px, baseline at y=30 (cap-height ≈ 14px, centered: (48-14)/2 + 14 ≈ 31).
    -->
    <text
      x="0"
      y="30"
      font-family="'Space Grotesk', 'DM Sans', system-ui, sans-serif"
      font-size="20"
      font-weight="500"
      letter-spacing="2.4"
      fill="#2D2B55"
    >ROUNDTABLE</text>
  </g>
</svg>
